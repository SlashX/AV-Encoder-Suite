# ══════════════════════════════════════════════════════════════════════
# AV Encoder Suite — DJI Osmo Action 6: D-Log M Outdoor
# ══════════════════════════════════════════════════════════════════════
# Profil pentru filmari D-Log M outdoor cu LUT aplicat.
# Rezolutie: pastreaza original (2.7K/4K)
# Calitate: CRF 19 echilibrat pentru outdoor
# Audio: AAC 192k standard
# LOG: D-Log M cu LUT aplicat automat
# NOTA: Necesita LUT-ul dji_dlog_m_to_rec709.cube in folderul Luts/
# Generat: 2026-04-06
# ══════════════════════════════════════════════════════════════════════

# Encoder
ENCODER_NAME="libx265"
AV1_ENCODER_NAME=""
DNXHR_PROFILE=""
APV_PROFILE=""
PRORES_PROFILE=""
HW_ENC_CODEC=""
HW_ENC_PRESET=""
HW_ENC_QP=""
X264_PROFILE=""

# Container
CONTAINER="mp4"

# Rezolutie: gol = pastreaza original
SCALE_WIDTH=""

# FPS
TARGET_FPS=""
FPS_METHOD=""

# Filtru video: lut3d se aplica automat daca LUT_PATH e setat
VIDEO_FILTER_PRESET=""

# Audio (bash format): codec:bitrate
AUDIO_CODEC_ARG="aac:192k"

# Normalizare audio: 0 = dezactivat
AUDIO_NORMALIZE="0"

# Mod encodare: 1 = CRF
ENCODE_MODE="1"

# CRF: 19 pentru outdoor echilibrat
CRF_PARAM="19"

# Preset
PRESET_PARAM="medium"

# Tune
TUNE_PARAM=""

# Extra params
EXTRA_PARAM=""

# VBR (ignorat daca ENCODE_MODE=1)
VBR_PARAM=""
VBR_MAXRATE=""
VBR_BUFSIZE=""

# LOG/LUT: D-Log M cu LUT pentru conversie Rec.709
FORCE_LOG_DETECTION="1"
LOG_PROFILE="dlog_m"
LUT_PATH="dji_dlog_m_to_rec709.cube"

# Interactive Mode
INTERACTIVE_MODE="0"
