# ══════════════════════════════════════════════════════════════════════
# AV Encoder Suite — DJI Osmo Action 6: Moto Cinematic (D-Log M)
# ══════════════════════════════════════════════════════════════════════
# Profil cinematic pentru filmari moto cu D-Log M.
# Rezolutie: pastreaza original (2.7K/4K)
# Calitate: CRF 18 pentru maxim detaliu
# Preset: slow pentru compresie optima
# Audio: AAC 256k pentru calitate audio superioara
# LOG: D-Log M cu LUT aplicat automat
# NOTA: Necesita LUT-ul dji_dlog_m_to_rec709.cube in folderul Luts/
# Generat: 2026-04-06
# ══════════════════════════════════════════════════════════════════════

# Encoder
ENCODER_NAME="libx265"
AV1_ENCODER_NAME=""
DNXHR_PROFILE=""
APV_PROFILE=""
PRORES_PROFILE=""
HW_ENC_CODEC=""
HW_ENC_PRESET=""
HW_ENC_QP=""
X264_PROFILE=""

# Container
CONTAINER="mp4"

# Rezolutie: gol = pastreaza original
SCALE_WIDTH=""

# FPS
TARGET_FPS=""
FPS_METHOD=""

# Filtru video: lut3d se aplica automat daca LUT_PATH e setat
VIDEO_FILTER_PRESET=""

# Audio (bash format): codec:bitrate
AUDIO_CODEC_ARG="aac:256k"

# Normalizare audio: 0 = dezactivat
AUDIO_NORMALIZE="0"

# Mod encodare: 1 = CRF
ENCODE_MODE="1"

# CRF: 18 pentru calitate maxima cinematic
CRF_PARAM="18"

# Preset: slow pentru compresie optima
PRESET_PARAM="slow"

# Tune
TUNE_PARAM=""

# Extra params
EXTRA_PARAM=""

# VBR (ignorat daca ENCODE_MODE=1)
VBR_PARAM=""
VBR_MAXRATE=""
VBR_BUFSIZE=""

# LOG/LUT: D-Log M cu LUT pentru conversie Rec.709
FORCE_LOG_DETECTION="1"
LOG_PROFILE="dlog_m"
LUT_PATH="dji_dlog_m_to_rec709.cube"

# Interactive Mode
INTERACTIVE_MODE="0"
