# ══════════════════════════════════════════════════════════════════════
# AV Encoder Suite — Exemplu profil (.conf)
# ══════════════════════════════════════════════════════════════════════
#
# Fisierele .conf se salveaza in: /storage/emulated/0/Media/Profiles/
# La lansare, launcher-ul ofera optiunea de a incarca un profil salvat.
#
# Format: KEY="VALUE" — compatibil bash (source) si ps1 (Get-Content).
# Liniile cu # sunt ignorate.
#
# NOTA: profilele bash si ps1 au format diferit pentru audio:
#   Bash: AUDIO_CODEC_ARG="eac3:224k" (codec:bitrate intr-un singur camp)
#   PS1:  AUDIO_CODEC="eac3" + AUDIO_BITRATE="224k" (campuri separate)
#   Profilele NU sunt cross-platform — foloseste profilul potrivit.
#
# ── Exemplu: Film HDR 4K → x265 cu E-AC3 surround ──────────────────
# Generat: 2026-03-30
# ══════════════════════════════════════════════════════════════════════

# Encoder: libx265 / libx264 / av1 / dnxhr / prores / hwenc
ENCODER_NAME="libx265"

# AV1: libsvtav1 / libaom-av1 (ignorat pentru alte encodere)
AV1_ENCODER_NAME=""

# DNxHR: lb / sq / hq / hqx / 444 (ignorat pentru alte encodere)
DNXHR_PROFILE=""

# APV: light / standard / high / 422_10 / 444_10 (ignorat pentru alte encodere)
APV_PROFILE=""

# ProRes: proxy / lt / standard / hq / 4444 / 4444xq (ignorat pentru alte encodere)
PRORES_PROFILE=""

# HW Encode (PowerShell legacy v35): hevc_nvenc / h264_nvenc / av1_nvenc
#            hevc_qsv / h264_qsv / av1_qsv
#            hevc_amf / h264_amf / av1_amf
# AV1 necesita GPU specific: NVIDIA RTX 40+ / Intel Arc / AMD RDNA3+ (RX 7000)
HW_ENC_CODEC=""
HW_ENC_PRESET=""
HW_ENC_QP=""

# v42 — HW backend uniform pentru bash (Linux/macOS/Termux)
# HW_BACKEND: gol/sw = SW pur (libx265/libx264/libsvtav1)
#             nvenc       = NVENC NVIDIA (Linux)
#             vaapi       = VAAPI Intel iGPU + AMD (Linux)
#             qsv         = Intel Quick Sync (Linux)
#             videotoolbox = Apple VideoToolbox (macOS, inclusiv ProRes)
#             amf         = AMD AMF [experimental] (Linux)
#             mediacodec  = Android MediaCodec (Termux)
# Daca setat in .conf, sare peste prompt-ul interactiv din launcher.
HW_BACKEND=""

# HW_PRESET_SLOT: 1..7 (default 4 = Quality)
#   1 = Ultrafast | 2 = Faster | 3 = Fast | 4 = Quality | 5 = Slow | 6 = Slower | 7 = Veryslow
# Mapping per backend:
#   NVENC p1..p7 | VAAPI q1..q7 | QSV veryfast..veryslow
#   VideoToolbox q:v 80..50 | AMF speed/balanced/quality | MediaCodec 60%..150% bitrate
HW_PRESET_SLOT=""

# HW_FORCE: 0 = validare GPU (fallback la SW daca GPU nu suporta encoder-ul)
#           1 = bypass validare (forteaza encoder-ul chiar daca detectia zice ca nu suporta)
# Util pentru GPU-uri noi ne-detectate de regex-ul intern
# Pentru MediaCodec: 1 = bypass prompt confirmare pe SoC necunoscut
HW_FORCE="0"

# v42 — HW HDR policy uniform (NVENC/VAAPI/QSV/VT/AMF — bypass dialog HDR)
# Valori:
#   gol         — afiseaza dialog interactiv per fisier HDR (default)
#   sw_full     — fallback SW cu pastrare completa (DV native, HDR10+ dynamic)
#   sw_degraded — fallback SW degradat (DV→HDR10 BL, HDR10+→HDR10 static)
#   hw_hdr10    — HW 10-bit + signaling HDR10 (BT.2020 + PQ)
#   hw_hlg      — HW 10-bit + transfer=arib-std-b67 (HLG nativ)
#   hw_sdr      — HW tonemap HDR→SDR 8-bit (proxy rapid)
#   skip        — sare automat fisierele HDR
HW_HDR_POLICY=""

# v38/v39: MediaCodec HDR policy (Termux only — bypass dialog HDR pentru batch-uri)
# Valori:
#   gol         — afiseaza dialog interactiv per fisier HDR (default)
#   sw_full     — fallback SW cu pastrare completa (DV native, HDR10+ dynamic)
#   sw_degraded — fallback SW degradat (DV→HDR10 BL, HDR10+→HDR10 static)
#   hw_repair   — MediaCodec 10-bit + HDR10 signaling repair via hevc_metadata bsf
#   hw_hlg      — v39: MediaCodec HLG nativ 10-bit + transfer=arib-std-b67 (no SEI repair)
#   hw_sdr      — MediaCodec SDR tonemap 8-bit (proxy rapid)
#   skip        — sare automat fisierele HDR
# Util pentru batch-uri DJI HDR10/HDR10+/HLG unde policy e deja decisa
MEDIACODEC_HDR_POLICY=""

# x264: auto / high / high10 / high422 (ignorat pentru alte encodere)
X264_PROFILE=""

# Container: mkv / mp4 / mov / mxf (DNxHR) / webm (AV1)
CONTAINER="mkv"

# Rezolutie: gol = originala, sau width (ex: 3840, 1920, 1280)
SCALE_WIDTH=""

# FPS: gol = original, sau valoare (ex: 24, 30, 60, 24000/1001)
TARGET_FPS=""

# Metoda FPS: drop / minterpolate (ignorat daca TARGET_FPS e gol)
FPS_METHOD=""

# Filtru video: gol / denoise_light / denoise_medium / denoise_strong
#   sharpen_light / sharpen_medium / deinterlace / upscale_4k / vidstab
#   custom:filtru_ffmpeg (ex: custom:eq=brightness=0.1)
VIDEO_FILTER_PRESET=""

# Audio (bash format): codec:bitrate
#   aac:192k / aac:256k / opus:128k / opus:64k / flac:8 / eac3:224k / copy
AUDIO_CODEC_ARG="eac3:224k"

# Normalizare audio: 0 = dezactivat, 1 = EBU R128 (-24 LUFS, 2-pass)
AUDIO_NORMALIZE="0"

# Mod encodare: 1 = CRF (calitate constanta), 2 = VBR (bitrate tinta)
ENCODE_MODE="1"

# CRF custom: gol = auto per rezolutie, sau valoare (ex: 18, 22, 28)
CRF_PARAM=""

# Preset: ultrafast/superfast/veryfast/faster/fast/medium/slow/slower/veryslow
#   AV1: numar 1-9 (mapat la preset-ul encoder-ului)
PRESET_PARAM="slow"

# Tune: gol / animation / grain / film / stillimage / fastdecode
#   AV1: film-grain level 0-50 (0=dezactivat)
TUNE_PARAM=""

# Parametri extra encoder (ex: rc-lookahead=40:psy-rd=1.5)
EXTRA_PARAM=""

# VBR settings (ignorate daca ENCODE_MODE=1):
VBR_PARAM=""
VBR_MAXRATE=""
VBR_BUFSIZE=""

# Force LOG detection: 0 = auto-detect, 1 = trateaza tot ca LOG
FORCE_LOG_DETECTION="0"

# LOG Profile: gol = auto-detect, sau explicit: apple_log / samsung_log / dlog_m
LOG_PROFILE=""

# LUT Path: gol = fara LUT, sau nume fisier .cube din folderul Luts/
#   Ex: dji_dlog_m_to_rec709.cube, apple_log_to_rec709.cube
#   Daca setat, se aplica automat filtrul lut3d la encodare
LUT_PATH=""

# Interactive Mode: 0 = dezactivat, 1 = dialog dupa fiecare fisier
INTERACTIVE_MODE="0"
